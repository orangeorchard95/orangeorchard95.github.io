{{/* 正文字体：思源宋体（Noto Serif SC），标题张子山体的 @font-face 在 custom.css */}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="preload" href="/fonts/HYZhangZiShanTi.woff2" as="font" type="font/woff2" crossorigin>

{{/* 访问统计 — 推荐 GoatCounter：到 https://www.goatcounter.com 注册一个 code，
     然后在 params.toml 加 goatcounter = "你的code" 即自动启用。
     （Umami 则直接用 Blowfish 内置的 [umamiAnalytics] 配置，不走这里。） */}}
{{ with .Params.goatcounter }}
<script
  data-goatcounter="https://{{ . }}.goatcounter.com/count"
  async
  src="//gc.zgo.at/count.js"
></script>
{{ end }}
