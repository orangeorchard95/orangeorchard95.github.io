{{- /* B站视频嵌入。用法：bilibili BV号，可选 page 分P序号 */ -}}
{{- $bvid := .Get "bvid" | default (.Get 0) -}}
{{- $page := .Get "page" | default "1" -}}
<div class="bilibili-embed" style="position: relative; width: 100%; padding-bottom: 56.25%; margin: 1.5rem 0;">
  <iframe
    src="https://player.bilibili.com/player.html?bvid={{ $bvid }}&page={{ $page }}&autoplay=0&danmaku=0"
    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; border-radius: 0.5rem;"
    scrolling="no"
    frameborder="no"
    allowfullscreen="true"
    loading="lazy"
  ></iframe>
</div>
